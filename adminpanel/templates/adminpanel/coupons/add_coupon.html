{% extends "adminpanel/base_admin.html" %}

{% block content %}

<div class="p-6 max-w-xl mx-auto">

  <h2 class="text-2xl font-semibold mb-6">Add Coupon</h2>

  <!-- Messages -->
  {% if messages %}
    {% for message in messages %}
      <div class="mb-4 p-3 rounded
        {% if message.tags == 'error' %}
          bg-red-100 text-red-700
        {% else %}
          bg-green-100 text-green-700
        {% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="POST" class="space-y-4 bg-white p-6 rounded-xl shadow border">
    {% csrf_token %}

    <!-- Coupon Code -->
    <div>
      <label class="block text-sm font-medium mb-1">Coupon Code</label>
      <input type="text" name="code"
             minlength="4" maxlength="20"
             pattern="^[A-Za-z0-9]+$"
             placeholder="e.g. SAVE10"
             class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-black"
             required>
      <p class="text-xs text-gray-500 mt-1">
        4–20 characters, no spaces
      </p>
    </div>

    <!-- Discount -->
    <div>
      <label class="block text-sm font-medium mb-1">Discount (%)</label>
      <input type="number" name="discount"
             min="1" max="90"
             value="{{ coupon.discount_percent|default:'' }}"
             placeholder="Enter discount percentage"
             class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-black"
             required>
      <p class="text-xs text-gray-500 mt-1">
        Must be between 1% and 90%
      </p>
    </div>

    <!-- Minimum Order Value -->
    <div>
      <label class="block text-sm font-medium mb-1">Minimum Order Value (₹)</label>
      <input type="number" name="min_order_value"
             min="1"
             value="{{ coupon.min_order_value|default:'' }}"
             placeholder="Minimum cart value required"
             class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-black"
             required>
    </div>

    <!-- Maximum Discount -->
    <div>
      <label class="block text-sm font-medium mb-1">Maximum Discount (₹)</label>
      <input type="number" name="max_discount"
             min="1"
             value="{{ coupon.max_discount|default:'' }}"
             placeholder="Max discount cap"
             class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-black"
             required>
    </div>

    <!-- Valid From -->
    <div>
      <label class="block text-sm font-medium mb-1">Valid From</label>
      <input type="datetime-local" name="valid_from"
             value="{% if coupon %}{{ coupon.valid_from|date:'Y-m-d\\TH:i' }}{% endif %}"
             class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-black"
             required>
    </div>

    <!-- Valid To -->
    <div>
      <label class="block text-sm font-medium mb-1">Valid To</label>
      <input type="datetime-local" name="valid_to"
             value="{% if coupon %}{{ coupon.valid_to|date:'Y-m-d\\TH:i' }}{% endif %}"
             class="border p-2 w-full rounded focus:outline-none focus:ring-2 focus:ring-black"
             required>
    </div>

    <!-- Buttons -->
    <div class="flex justify-between items-center pt-4">

      <a href="{% url 'coupon_list' %}"
         class="text-gray-600 hover:underline text-sm">
         ← Back to Coupons
      </a>

      <button type="submit"
              class="bg-black text-white px-6 py-2 rounded hover:bg-gray-800 transition">
        {% if coupon %}Update Coupon{% else %}Create Coupon{% endif %}
      </button>

    </div>

  </form>

</div>

{% endblock %}
